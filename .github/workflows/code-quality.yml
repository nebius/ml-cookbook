name: code-quality

# Runs on every pull request (and on pushes to main) to keep contributions
# consistent. Each tool is its own job, so the PR "Checks" tab shows exactly
# which one passed or failed.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: Python & notebooks · Ruff (lint + format)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: ci-requirements/dev.txt
      - run: pip install -r ci-requirements/dev.txt
      # Ruff lints AND formats both .py and .ipynb natively.
      - name: Ruff lint
        run: ruff check --output-format=github .
      - name: Ruff format (check only)
        run: ruff format --check --diff .

  bandit:
    name: Python & notebooks · Bandit (security)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: ci-requirements/dev.txt
      - run: pip install -r ci-requirements/dev.txt
      - name: Bandit (.py files)
        run: bandit -c pyproject.toml -r . --severity-level medium
      - name: Bandit (notebooks via nbQA)
        run: |
          notebooks="$(git ls-files '*.ipynb')"
          if [ -n "$notebooks" ]; then
            # shellcheck disable=SC2086  # intentional word-splitting into file args
            nbqa bandit $notebooks -c pyproject.toml --severity-level medium
          else
            echo "No notebooks found; skipping."
          fi

  shellcheck:
    name: Shell · ShellCheck
    runs-on: ubuntu-24.04   # shellcheck is pre-installed on GitHub runners
    steps:
      - uses: actions/checkout@v6
      - name: ShellCheck
        run: |
          files="$(git ls-files '*.sh' '*.bash')"
          if [ -n "$files" ]; then
            # shellcheck disable=SC2086  # intentional word-splitting into file args
            shellcheck -x --severity=warning $files
          else
            echo "No shell scripts found; skipping."
          fi
